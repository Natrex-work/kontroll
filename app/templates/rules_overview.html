{% extends 'base.html' %}
{% block title %}Regelverk · {{ app_name }}{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Regelverk Fiskeri</h1>
    <p class="muted">Velg kontrolltype, art og redskap. Appen viser kontrollpunkter og lovtekst for akkurat dette valget.</p>
  </div>
</section>

<section id="rules-overview-root" class="card stack gap-m"
  data-law='{{ law_browser|tojson }}'
  data-rules-url="/api/rules">
  <div class="grid-two">
    <label><span>Kontrolltype</span><select id="overview_control_type"><option value="">Velg</option>{% for option in control_types %}<option value="{{ option }}">{{ option }}</option>{% endfor %}</select></label>
    <label><span>Art / fiskeri</span><select id="overview_fishery_type"><option value="">Velg</option></select></label>
    <label><span>Art (kan skrives manuelt)</span><input id="overview_species" list="overview_species_options" /><datalist id="overview_species_options"></datalist></label>
    <label><span>Redskap</span><select id="overview_gear_type"><option value="">Velg</option></select></label>
  </div>
  <div class="actions-row wrap">
    <button class="btn btn-primary" type="button" id="overview_fetch_rules">Vis relevante kontrollpunkter</button>
    <form method="post" action="/cases/new" class="inline-form">
      <button class="btn btn-secondary" type="submit">Bruk i ny kontroll</button>
    </form>
  </div>
  <div id="overview_rule_summary" class="stack gap-s"></div>
</section>
{% endblock %}
{% block page_scripts %}<script src="/static/js/rules-overview.js"></script>{% endblock %}
