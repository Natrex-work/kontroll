name: KontrollOgOppsynNative
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: '16.0'
settings:
  base:
    SWIFT_VERSION: '5.0'
    CURRENT_PROJECT_VERSION: '44'
    MARKETING_VERSION: 1.4.0
    PRODUCT_BUNDLE_IDENTIFIER: no.example.kontrollogoppsyn.ios
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_KEY_CFBundleDisplayName: Fiskerikontroll
    INFOPLIST_KEY_NSCameraUsageDescription: Appen bruker kamera ved OCR-søk og dokumentasjon av avvik.
    INFOPLIST_KEY_NSFaceIDUsageDescription: Face ID eller kode brukes for å beskytte kontrollopplysninger når appen åpnes på nytt.
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Appen bruker posisjon for kart, områdekontroll og regelvurdering.
    INFOPLIST_KEY_NSMicrophoneUsageDescription: Appen bruker mikrofon når kontrollør legger ved lydopptak eller tale.
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Appen lagrer dokumentasjon og eksporterte filer som brukeren velger å dele eller lagre.
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Appen bruker bilder og filer som dokumentasjon i saker.
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    TARGETED_DEVICE_FAMILY: '1,2'
    CODE_SIGN_STYLE: Automatic
targets:
  KontrollOgOppsynNative:
    type: application
    platform: iOS
    sources:
      - path: KontrollOgOppsynNative
        excludes:
          - AppConfig.example.plist
    resources:
      - KontrollOgOppsynNative/Assets.xcassets
      - KontrollOgOppsynNative/AppConfig.plist
      - KontrollOgOppsynNative/PrivacyInfo.xcprivacy
